name: Update streams

on:
  schedule:
    - cron: "*/0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streams:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: node scripts/sync-streamers-from-sheet.mjs
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          GOOGLE_SETTINGS_CSV_URL: ${{ secrets.GOOGLE_SETTINGS_CSV_URL }}

      - run: npm run update:streams
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit updated streams
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/streamers.json data/streams.json

          if ! git diff --cached --quiet; then
            git commit -m "Update streams"
            git push
          fi